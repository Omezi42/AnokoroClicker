<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あの頃の自作TCGクリッカー</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>あの頃の自作TCGクリッカー</h1>
        <div class="energy-display">
            <span class="energy-label">エネルギー:</span>
            <span id="energy-count">0</span>
        </div>
        <div class="energy-stats">
            <span>毎秒: <span id="energy-per-second">0</span></span>
            <span>クリック: <span id="energy-per-click">1</span></span>
        </div>
    </header>

    <main class="main-content">
        <div class="click-area">
            <div id="core-container" class="core-container">
                <!-- ここにノーマルエネルギーの画像が入ります -->
                <img src="" alt="エネルギーコア" id="main-core" style="display: none;">
                <div id="core-placeholder" class="core-placeholder">コア読込中</div>
            </div>
        </div>

        <div class="upgrade-area">
            <h2>アップグレード（ショップ）</h2>
            
            <div class="buy-toggles">
                <button class="buy-toggle active" data-amount="1">x1</button>
                <button class="buy-toggle" data-amount="10">x10</button>
                <button class="buy-toggle" data-amount="100">x100</button>
                <button class="buy-toggle" data-amount="MAX">MAX</button>
            </div>

            <!-- デッキスロット表示エリア -->
            <div class="deck-container">
                <h3>デッキ（装備中のカード） <span id="deck-synergy-info" style="font-size:12px; color:#ff9800; cursor:help;">[ボーナス詳細]</span></h3>
                <div class="deck-slots">
                    <div class="deck-slot" data-index="0"></div>
                    <div class="deck-slot" data-index="1"></div>
                    <div class="deck-slot" data-index="2"></div>
                    <div class="deck-slot" data-index="3"></div>
                    <div class="deck-slot" data-index="4"></div>
                </div>
            </div>

            <div class="card-list" id="card-list">
                <!-- カードがJavaScriptによって生成されます -->
            </div>
        </div>
    </main>

    <!-- UI Overlays -->
    <div class="settings-panel">
        <button id="btn-achievements" class="btn btn-info">🏆 実績</button>
        <button id="btn-save" class="btn">💾 セーブ</button>
        <button id="btn-reset" class="btn btn-danger">リセット</button>
    </div>

    <!-- Achievement Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Offline Progress Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>オフライン進行</h2>
            <p id="offline-message"></p>
            <button id="btn-modal-close" class="btn">受け取る</button>
        </div>
    </div>

    <!-- Achievements Modal -->
    <div id="achievements-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content achievements-content">
            <h2>🏆 実績一覧</h2>
            <p>現在の生産力ボーナス: <strong id="achievement-bonus" style="color:var(--accent-color);">+0%</strong></p>
            <div id="achievements-list" class="achievements-list">
                <!-- 実績リストが動的に生成されます -->
            </div>
            <button id="btn-achievements-close" class="btn" style="margin-top: 15px;">閉じる</button>
        </div>
    </div>

    <!-- Deck Selection Modal -->
    <div id="deck-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content deck-content">
            <h2>デッキに装備するカードを選択</h2>
            <p>※1枚以上所持しているカードのみ装備可能です。<br>同じカードは複数装備できません。</p>
            <button id="btn-unequip" class="btn btn-danger" style="margin-bottom: 10px;">装備を外す</button>
            <div id="deck-selection-list" class="deck-selection-list">
                <!-- 所持カードリスト -->
            </div>
            <button id="btn-deck-close" class="btn" style="margin-top: 15px;">キャンセル</button>
        </div>
    </div>

    <script src="cardsData.js?v=3"></script>
    <script src="main.js?v=3"></script>
</body>
</html>
